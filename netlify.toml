[build]
  # Figma frames are rendered live at runtime by the figma-image function
  # (needs FIGMA_TOKEN env var), so the build is just the static site.
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

# SPA fallback so deep links / refreshes resolve to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
